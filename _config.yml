# Site settings
title: Daily Magazine
description: Your daily curated content
url: "https://koh84.github.io" # Change to your GitHub username
baseurl: "" # Leave empty if using username.github.io

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed

# Source and destination
source: .
destination: _site

# Collections for articles
collections:
  articles:
    output: true
    permalink: /articles/:title/
    read_fields: true

# Custom settings for magazine layout
articles_dir: _articles
images_dir: assets/images/articles
